<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jeju Travel PWA</title>
    <!-- 引入極簡圖標庫 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Naver 地圖 API -->
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_NAVER_CLIENT_ID"></script>
    <style>
        :root {
            --bg-primary: #fcfbfa;
            --bg-card: #ffffff;
            --text-main: #2c2a29;
            --text-muted: #8a837e;
            --accent-orange: #e2703a;
            --accent-green: #5f7468;
            --accent-blue: #536c84;
            --border-color: #eeece9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding-bottom: 90px;
            font-size: 14px;
        }

        .app-header {
            background: var(--bg-card);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .day-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }
        .day-selector::-webkit-scrollbar { display: none; }

        .day-btn {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            white-space: nowrap;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
        }
        .day-btn.active {
            background: var(--text-main);
            color: #fff;
            border-color: var(--text-main);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(44,42,41,0.02);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(44,42,41,0.08);
            transform: translateY(-2px);
        }

        .card-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            background: var(--text-main);
            color: #fff;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            border: none;
        }

        .nav-btn:hover {
            background: var(--accent-orange);
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 8px 0;
        }

        .badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-food { background: #fdf3ee; color: var(--accent-orange); }
        .badge-must { background: #fbf2f2; color: #d9534f; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            padding: 10px 0;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .nav-item.active { color: var(--accent-orange); }

        /* 地圖模態框 */
        .map-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .map-modal.active {
            display: flex;
        }

        .map-container {
            background: var(--bg-card);
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .map-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .map-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
        }

        #naverMap {
            width: 100%;
            height: 400px;
            border-radius: 0 0 16px 16px;
        }

        .map-info {
            padding: 16px;
            text-align: center;
        }

        .map-info p {
            margin: 4px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>JEJU 濟州自駕 🍊</h1>
    </div>

    <div class="container">
        <!-- 每日行程頁 -->
        <div id="itinerary-tab" class="tab-content active">
            <div class="day-selector">
                <button class="day-btn active" onclick="switchDay(1)">D1 (6/29)</button>
                <button class="day-btn" onclick="switchDay(2)">D2 (6/30)</button>
                <!-- 加至 D6 ... -->
            </div>

            <div id="day1" class="day-panel">
                <div class="card" onclick="showMap('冠軍花蟹 1 號店', 33.2427, 126.5601)">
                    <div class="card-time"><i class="bi bi-clock"></i> 20:30</div>
                    <div class="card-title">
                        <span>冠軍花蟹 1 號店</span>
                    </div>
                    <div class="badge-group">
                        <span class="badge badge-food">必吃美食：醬蟹</span>
                        <span class="badge badge-must">重要：IG分享享優惠</span>
                    </div>
                    <div style="font-size: 12px; color: var(--accent-orange); margin-top: 8px;">
                        <i class="bi bi-geo-alt"></i> 點擊查看地圖位置
                    </div>
                </div>
            </div>
        </div>

        <!-- 資訊頁 -->
        <div id="info-tab" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 16px;">📋 濟州島旅遊資訊</h2>
                <p style="line-height: 1.6; color: var(--text-muted);">
                    歡迎來到濟州島！這是韓國最大的島嶼，以其美麗的自然風景和豐富的文化而聞名。
                </p>
            </div>
        </div>

        <!-- 記帳頁 -->
        <div id="ledger-tab" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 16px;">💰 旅遊記帳</h2>
                <p style="color: var(--text-muted);">記帳功能即將推出...</p>
            </div>
        </div>
    </div>

    <!-- 地圖模態框 -->
    <div class="map-modal" id="mapModal">
        <div class="map-container">
            <div class="map-header">
                <h2 id="mapTitle">位置</h2>
                <button class="close-btn" onclick="closeMap()"><i class="bi bi-x"></i></button>
            </div>
            <div id="naverMap"></div>
            <div class="map-info">
                <p id="mapCoords"></p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('itinerary')"><i class="bi bi-calendar3"></i>行程</button>
        <button class="nav-item" onclick="switchTab('info')"><i class="bi bi-info-circle"></i>資訊</button>
        <button class="nav-item" onclick="switchTab('ledger')"><i class="bi bi-wallet2"></i>記帳</button>
    </nav>

    <script>
        let naverMap = null;
        let marker = null;

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-tab').classList.add('active');

            // 更新導航欄按鈕狀態
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function switchDay(num) {
            // 切換日期面板邏輯
            document.querySelectorAll('.day-panel').forEach(el => el.style.display = 'none');
            document.getElementById('day' + num).style.display = 'block';

            // 更新日期按鈕狀態
            document.querySelectorAll('.day-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function showMap(name, lat, lng) {
            const modal = document.getElementById('mapModal');
            modal.classList.add('active');
            
            document.getElementById('mapTitle').textContent = name;
            document.getElementById('mapCoords').textContent = `緯度: ${lat.toFixed(4)}, 經度: ${lng.toFixed(4)}`;

            // 初始化地圖
            if (!naverMap) {
                naverMap = new naver.maps.Map('naverMap', {
                    center: new naver.maps.LatLng(lat, lng),
                    zoom: 15,
                    mapTypeControl: true,
                    zoomControl: true
                });
            } else {
                naverMap.setCenter(new naver.maps.LatLng(lat, lng));
            }

            // 移除舊標記
            if (marker) {
                marker.setMap(null);
            }

            // 添加新標記
            marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(lat, lng),
                map: naverMap,
                title: name
            });

            // 添加信息窗口
            const infoWindow = new naver.maps.InfoWindow({
                content: `<div style="padding: 10px; text-align: center; font-size: 12px;"><strong>${name}</strong></div>`,
                maxWidth: 140
            });

            naver.maps.Event.addListener(marker, 'click', function() {
                infoWindow.open(naverMap, marker);
            });

            // 自動打開信息窗口
            infoWindow.open(naverMap, marker);
        }

        function closeMap() {
            const modal = document.getElementById('mapModal');
            modal.classList.remove('active');
        }

        // 點擊模態框背景關閉
        document.getElementById('mapModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMap();
            }
        });
    </script>
</body>
</html>
